<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anchor Safety</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f2f2f;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      background: linear-gradient(135deg, #1c4d4d, #0f2f2f);
    }

    h1 {
      margin: 10px 0;
      font-size: 28px;
    }

    .level {
      background: rgba(255,255,255,0.2);
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      margin-top: 10px;
    }

    .container {
      padding: 20px;
    }

    button {
      padding: 15px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      margin: 10px;
      background: #00b894;
      color: white;
      cursor: pointer;
      width: 90%;
      max-width: 300px;
    }

    button:hover {
      background: #00a383;
    }

    .box {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <header>
    <h1>🚨 Anchor Safety</h1>
    <div class="level">Level 4</div>
  </header>

  <div class="container">

    <div class="box">
      <h2>📍 Open Location</h2>
      <button onclick="openMaps()">Open Google Maps</button>
    </div>

    <div class="box">
      <h2>👨‍👩‍👧 Care Circle</h2>
      <p>Send "I'm safe" message with your location</p>
      <button onclick="sendSafe()">I'm Safe</button>
    </div>

  </div>

  <script>
    function openMaps() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;

          const url = `https://www.google.com/maps?q=${lat},${lon}`;
          window.open(url, "_blank");
        }, function() {
          alert("Location access denied.");
        });
      } else {
        alert("Geolocation not supported.");
      }
    }

    function sendSafe() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;

          const message = encodeURIComponent(
            "I'm safe. My location: https://www.google.com/maps?q=" + lat + "," + lon
          );

          const smsLink = `sms:?body=${message}`;
          window.location.href = smsLink;

        }, function() {
          alert("Location access denied.");
        });
      } else {
        alert("Geolocation not supported.");
      }
    }
  </script>

</body>
</html>
